name: Generate API Spec

on:
  workflow_dispatch:
    inputs:
      dataset_key:
        description: "Dataset Key"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

concurrency:
  group: generate-spec-${{ inputs.dataset_key }}
  cancel-in-progress: true

jobs:
  generate-spec:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout CLI Repo
      # =========================
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Setup Java 21
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # =========================
      # Install Ballerina
      # =========================
      - name: Install Ballerina 2201.13.1
        run: |
          curl -L https://dist.ballerina.io/downloads/2201.13.1/ballerina-2201.13.1-swan-lake-linux-x64.deb -o ballerina.deb
          sudo dpkg -i ballerina.deb

      - name: Verify Ballerina version
        run: bal version

      # =========================
      # Build native module
      # =========================
      - name: Build native Java module
        run: |
          cd modules/sdkanalyzer/native
          chmod +x gradlew
          ./gradlew build
          cd ../../..

      # =========================
      # Clean project
      # =========================
      - name: Clean project
        run: bal clean

      # =========================
      # Build project
      # =========================
      - name: Build project
        run: bal build

      # =========================
      # 🔥 FIX: FORCE ABSOLUTE OUTPUT PATH
      # =========================
      - name: Run analyze + generate
        run: |
          export SPEC_OUTPUT_DIR="${GITHUB_WORKSPACE}/modules/api_specification_generator/spec-output"

          echo "Using output dir: $SPEC_OUTPUT_DIR"

          mkdir -p "$SPEC_OUTPUT_DIR"

          bal run -- analyze ${{ inputs.dataset_key }}
          bal run -- generate ${{ inputs.dataset_key }}

      # =========================
      # 🔥 FIX: Use absolute path validation
      # =========================
      - name: Locate API spec file
        run: |
          FILE="${GITHUB_WORKSPACE}/modules/api_specification_generator/spec-output/${{ inputs.dataset_key }}_spec.bal"

          echo "Checking file: $FILE"

          echo "Listing output directory:"
          ls -R "${GITHUB_WORKSPACE}/modules/api_specification_generator/spec-output" || true

          if [ ! -f "$FILE" ]; then
            echo "❌ Spec file NOT found at expected location"
            exit 1
          fi

          mkdir -p spec
          cp "$FILE" spec/api_spec.bal

      # =========================
      # Checkout target repo
      # =========================
      - name: Checkout spec repo
        uses: actions/checkout@v4
        with:
          repository: KKanistan06/generated-ballerina-spec
          token: ${{ secrets.GH_PAT }}
          path: spec-repo

      # =========================
      # Commit + Push
      # =========================
      - name: Commit API spec
        run: |
          cp -r spec/* spec-repo/

          cd spec-repo
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          BRANCH="auto/spec-${{ inputs.dataset_key }}"
          git checkout -b $BRANCH || git checkout $BRANCH

          git add .
          git commit -m "Auto API spec for ${{ inputs.dataset_key }}" || echo "No changes"
          git push origin $BRANCH --force

      # =========================
      # Create PR
      # =========================
      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          commit-message: "Auto API spec for ${{ inputs.dataset_key }}"
          branch: auto/spec-${{ inputs.dataset_key }}
          title: "API Spec: ${{ inputs.dataset_key }}"
          body: |
            This PR contains the auto-generated API specification.

            Dataset: ${{ inputs.dataset_key }}
          base: main
          path: spec-repo
