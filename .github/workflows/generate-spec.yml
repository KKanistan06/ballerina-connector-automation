name: Generate API Spec

on:
  workflow_dispatch:
    inputs:
      dataset_key:
        description: "Dataset Key"
        required: true

env:
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  PROJECT_ROOT: ${{ github.workspace }}

concurrency:
  group: generate-spec-${{ inputs.dataset_key }}
  cancel-in-progress: true

jobs:
  generate-spec:
    runs-on: ubuntu-latest

    steps:
      # Checkout CLI repo
      - name: Checkout CLI repo
        uses: actions/checkout@v4

      # Setup Java 21
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # Install Ballerina
      - name: Install Ballerina
        run: |
          curl -L https://dist.ballerina.io/downloads/2201.13.1/ballerina-2201.13.1-swan-lake-linux-x64.deb -o ballerina.deb
          sudo dpkg -i ballerina.deb

      - name: Verify Ballerina
        run: bal version

      # Build native module
      - name: Build native module
        run: |
          cd modules/sdkanalyzer/native
          chmod +x gradlew
          ./gradlew build
          cd ../../..

      # Clean + Build
      - name: Clean project
        run: bal clean

      - name: Build project
        run: bal build

      # Run pipeline
      - name: Run analyze + generate
        run: |
          export PROJECT_ROOT=$GITHUB_WORKSPACE

          bal run -- analyze ${{ inputs.dataset_key }}
          bal run -- generate ${{ inputs.dataset_key }}

      # Collect outputs
      - name: Collect outputs
        run: |
          DATASET=${{ inputs.dataset_key }}

          echo "Collecting outputs for $DATASET"

          mkdir -p artifacts

          # Metadata
          META=$(find . -name "${DATASET}-metadata.json" | head -n 1)
          if [ -z "$META" ]; then
            echo "metadata.json missing!"
            exit 1
          fi
          cp "$META" artifacts/

          # IR
          IR=$(find . -name "${DATASET}-ir.json" | head -n 1)
          if [ -z "$IR" ]; then
            echo "IR json missing!"
            exit 1
          fi
          cp "$IR" artifacts/

          # Spec
          SPEC=$(find . -name "*${DATASET}*_spec.bal" | head -n 1)
          if [ -z "$SPEC" ]; then
            echo "Spec file missing!"
            exit 1
          fi

          # Rename correctly
          cp "$SPEC" artifacts/${DATASET}_spec.bal

          echo "All artifacts collected"

      # Checkout spec repo
      - name: Checkout spec repo
        uses: actions/checkout@v4
        with:
          repository: KKanistan06/generated-ballerina-spec
          token: ${{ secrets.GH_PAT }}
          path: spec-repo

      # Copy artifacts
      - name: Copy artifacts
        run: |
          DATASET=${{ inputs.dataset_key }}

          mkdir -p spec-repo/$DATASET
          cp -r artifacts/* spec-repo/$DATASET/

      # Create PR
      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          path: spec-repo
          branch: auto/spec-${{ inputs.dataset_key }}
          base: main
          commit-message: "API bundle for ${{ inputs.dataset_key }}"
          title: "API Spec Bundle: ${{ inputs.dataset_key }}"
          body: |
            Includes:
            - API Spec (${ { inputs.dataset_key } }_spec.bal)
            - Metadata JSON
            - IR JSON
