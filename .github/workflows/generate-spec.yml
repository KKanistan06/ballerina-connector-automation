name: Generate API Spec

on:
  workflow_dispatch:
    inputs:
      dataset_key:
        description: "Dataset Key"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  PROJECT_ROOT: ${{ github.workspace }}

concurrency:
  group: generate-spec-${{ inputs.dataset_key }}
  cancel-in-progress: true

jobs:
  generate-spec:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout CLI Repo
      # =========================
      - name: Checkout CLI repo
        uses: actions/checkout@v4

      # =========================
      # Setup Java 21
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # =========================
      # Install Ballerina
      # =========================
      - name: Install Ballerina 2201.13.1
        run: |
          curl -L https://dist.ballerina.io/downloads/2201.13.1/ballerina-2201.13.1-swan-lake-linux-x64.deb -o ballerina.deb
          sudo dpkg -i ballerina.deb

      - name: Verify Ballerina
        run: bal version

      # =========================
      # Build native module
      # =========================
      - name: Build native Java module
        run: |
          cd modules/sdkanalyzer/native
          chmod +x gradlew
          ./gradlew build
          cd ../../..

      # =========================
      # Clean + Build
      # =========================
      - name: Clean project
        run: bal clean

      - name: Build project
        run: bal build

      # =========================
      # Run pipeline (IMPORTANT)
      # =========================
      - name: Run analyze + generate
        run: |
          export PROJECT_ROOT=$GITHUB_WORKSPACE

          bal run -- analyze ${{ inputs.dataset_key }}
          bal run -- generate ${{ inputs.dataset_key }}

      # =========================
      # Collect ALL required artifacts
      # =========================
      - name: Collect artifacts
        run: |
          DATASET=${{ inputs.dataset_key }}

          mkdir -p dataset/$DATASET

          echo "🔍 Collecting metadata..."
          META=$(find . -name "*${DATASET}*metadata.json" | head -n 1)

          echo "🔍 Collecting IR..."
          IR=$(find . -name "*${DATASET}*ir*.json" | head -n 1)

          echo "🔍 Collecting spec..."
          SPEC=$(find . -name "*${DATASET}*_spec.bal" | head -n 1)

          if [ -z "$META" ] || [ -z "$IR" ] || [ -z "$SPEC" ]; then
            echo "❌ Missing required artifacts"
            echo "META=$META"
            echo "IR=$IR"
            echo "SPEC=$SPEC"
            exit 1
          fi

          cp "$META" dataset/$DATASET/metadata.json
          cp "$IR" dataset/$DATASET/ir.json
          cp "$SPEC" dataset/$DATASET/api_spec.bal

      # =========================
      # Checkout spec repo
      # =========================
      - name: Checkout spec repo
        uses: actions/checkout@v4
        with:
          repository: KKanistan06/generated-ballerina-spec
          token: ${{ secrets.GH_PAT }}
          path: spec-repo

      # =========================
      # Copy dataset into repo
      # =========================
      - name: Copy dataset
        run: |
          mkdir -p spec-repo/datasets
          cp -r dataset/* spec-repo/datasets/

      # =========================
      # Create PR
      # =========================
      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          path: spec-repo
          branch: auto/spec-${{ inputs.dataset_key }}
          base: main
          commit-message: "Auto API spec + metadata for ${{ inputs.dataset_key }}"
          title: "Dataset: ${{ inputs.dataset_key }}"
          body: |
            This PR includes:

            - API Spec
            - Metadata JSON
            - Intermediate Representation (IR)

            Dataset: ${{ inputs.dataset_key }}
