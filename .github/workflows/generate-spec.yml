name: Generate API Spec

on:
  workflow_dispatch:
    inputs:
      dataset_key:
        description: "Dataset Key"
        required: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
  PROJECT_ROOT: ${{ github.workspace }}

concurrency:
  group: generate-spec-${{ inputs.dataset_key }}
  cancel-in-progress: true

jobs:
  generate-spec:
    runs-on: ubuntu-latest

    steps:
      # =========================
      # Checkout CLI Repo
      # =========================
      - name: Checkout CLI repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # =========================
      # Setup Java 21
      # =========================
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      # =========================
      # Install Ballerina
      # =========================
      - name: Install Ballerina 2201.13.1
        run: |
          curl -L https://dist.ballerina.io/downloads/2201.13.1/ballerina-2201.13.1-swan-lake-linux-x64.deb -o ballerina.deb
          sudo dpkg -i ballerina.deb

      - name: Verify Ballerina version
        run: bal version

      # =========================
      # Build native module
      # =========================
      - name: Build native Java module
        run: |
          cd modules/sdkanalyzer/native
          chmod +x gradlew
          ./gradlew build
          cd ../../..

      # =========================
      # Clean project
      # =========================
      - name: Clean project
        run: bal clean

      # =========================
      # Build project
      # =========================
      - name: Build project
        run: bal build

      # =========================
      # Run analysis
      # =========================
      - name: Run analyze + generate
        run: |
          cd $GITHUB_WORKSPACE
          export PROJECT_ROOT=$GITHUB_WORKSPACE

          bal run -- analyze ${{ inputs.dataset_key }}
          bal run -- generate ${{ inputs.dataset_key }}

      # =========================
      # Locate generated spec file
      # =========================
      - name: Locate API spec file
        run: |
          echo "Searching for generated spec file..."

          FILE=$(find $GITHUB_WORKSPACE -type f -name "*${{ inputs.dataset_key }}*_spec.bal" | head -n 1)

          if [ -z "$FILE" ]; then
            echo "❌ Spec file not found!"
            find $GITHUB_WORKSPACE -type f | grep spec || true
            exit 1
          fi

          echo "Found: $FILE"

          mkdir -p spec
          cp "$FILE" spec/api_spec.bal

      # =========================
      # Checkout target repo
      # =========================
      - name: Checkout spec repo
        uses: actions/checkout@v4
        with:
          repository: KKanistan06/generated-ballerina-spec
          token: ${{ secrets.GH_PAT }}
          path: spec-repo

      # =========================
      # Copy spec into repo
      # =========================
      - name: Copy spec into repo
        run: |
          cp -r spec/* spec-repo/

      # =========================
      # Create Pull Request (ONLY PR HANDLING)
      # =========================
      - name: Create PR
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GH_PAT }}
          path: spec-repo
          branch: auto/spec-${{ inputs.dataset_key }}
          base: main
          commit-message: "Auto API spec for ${{ inputs.dataset_key }}"
          title: "API Spec: ${{ inputs.dataset_key }}"
          body: |
            This PR contains the auto-generated API specification.

            Dataset: ${{ inputs.dataset_key }}
